<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wumpus World Agent</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: #1e1e2e;
    color: #e0e0e0;
    padding: 30px 20px;
    min-height: 100vh;
  }

  h2 {
    text-align: center;
    font-size: 1.3rem;
    letter-spacing: 2px;
    color: #cdd6f4;
    margin-bottom: 24px;
    text-transform: uppercase;
  }

  .controls {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 20px;
  }

  label { font-size: 0.85rem; color: #a6adc8; }

  input[type=number] {
    width: 48px;
    padding: 4px 6px;
    font-family: inherit;
    font-size: 0.85rem;
    background: #313244;
    border: 1px solid #45475a;
    color: #cdd6f4;
    border-radius: 5px;
    outline: none;
  }

  button {
    padding: 6px 16px;
    font-family: inherit;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    border-radius: 5px;
    border: none;
    transition: opacity 0.15s;
  }
  button:hover    { opacity: 0.85; }
  button:disabled { opacity: 0.35; cursor: not-allowed; }

  #btn-new  { background: #cba6f7; color: #1e1e2e; }
  #btn-step { background: #89b4fa; color: #1e1e2e; }
  #btn-auto { background: #a6e3a1; color: #1e1e2e; }
  #btn-stop { background: #f38ba8; color: #1e1e2e; }

  .info-bar {
    display: flex;
    justify-content: center;
    gap: 30px;
    background: #313244;
    border-radius: 8px;
    padding: 10px 20px;
    margin: 0 auto 20px;
    max-width: 600px;
    font-size: 0.85rem;
    color: #a6adc8;
  }
  .info-bar span { color: #cdd6f4; font-weight: 600; }

  #status {
    text-align: center;
    font-size: 0.9rem;
    color: #f9e2af;
    min-height: 22px;
    margin-bottom: 16px;
    font-weight: 500;
  }

  #grid-wrap { display: flex; justify-content: center; }

  #grid {
    display: inline-grid;
    gap: 4px;
    background: #181825;
    padding: 8px;
    border-radius: 10px;
    border: 1px solid #313244;
  }

  .cell {
    width: 62px;
    height: 62px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 7px;
    font-size: 0.7rem;
    font-weight: 600;
    color: #fff;
    border: 2px solid transparent;
    transition: background 0.25s;
  }

  .cell-unknown { background: #313244; border-color: #45475a; color: #6c7086; }
  .cell-safe    { background: #1e4a2e; border-color: #40a060; color: #d0ffd8; }
  .cell-agent   { background: #1a3a5a; border-color: #5a9de0; color: #cce8ff; }
  .cell-danger  { background: #4a1a1a; border-color: #c04040; color: #ffd0d0; }

  .cell .coord { font-size: 0.6rem; opacity: 0.6; }
  .cell .lbl   { font-size: 0.75rem; margin-top: 2px; letter-spacing: 1px; }
</style>
</head>
<body>

<h2>Wumpus World Agent</h2>

<div class="controls">
  <label>Rows: <input type="number" id="inp-rows" value="4" min="3" max="8"></label>
  <label>Cols: <input type="number" id="inp-cols" value="4" min="3" max="8"></label>
  <label>Pits: <input type="number" id="inp-pits" value="3" min="1" max="10"></label>
  <button id="btn-new"  onclick="initGame()">New Game</button>
  <button id="btn-step" onclick="agentStep()" disabled>Step</button>
  <button id="btn-auto" onclick="startAuto()" disabled>Auto</button>
  <button id="btn-stop" onclick="stopAuto()"  disabled>Stop</button>
</div>

<div class="info-bar">
  <div>Inference Steps: <span id="m-infer">0</span></div>
  <div>Percepts: <span id="m-percepts">—</span></div>
</div>

<div id="status">Press New Game to start.</div>

<div id="grid-wrap">
  <div id="grid"></div>
</div>

<script>

var ROWS, COLS;
var grid = [];          
var agent = { r: 0, c: 0 };
var gameOver = false;
var autoTimer = null;
var inferenceSteps = 0;


var KB = [];
var KB_index = new Set();  

var visited   = new Set();  
var safeSet   = new Set(); 
var dangerSet = new Set();  
var percepts  = {};         



function cellKey(r, c) {
  return r + '_' + c;
}

function getNeighbors(r, c) {
  var result = [];
  if (r > 0)       result.push([r - 1, c]);
  if (r < ROWS - 1) result.push([r + 1, c]);
  if (c > 0)       result.push([r, c - 1]);
  if (c < COLS - 1) result.push([r, c + 1]);
  return result;
}

function randInt(max) {
  return Math.floor(Math.random() * max);
}



function initGame() {
  stopAuto();

  ROWS = parseInt(document.getElementById('inp-rows').value) || 4;
  COLS = parseInt(document.getElementById('inp-cols').value) || 4;
  var numPits = parseInt(document.getElementById('inp-pits').value) || 3;

  // Reset state
  gameOver = false;
  inferenceSteps = 0;
  KB = [];
  KB_index = new Set();
  visited.clear();
  safeSet.clear();
  dangerSet.clear();
  percepts = {};

  grid = [];
  for (var r = 0; r < ROWS; r++) {
    grid[r] = [];
    for (var c = 0; c < COLS; c++) {
      grid[r][c] = { pit: false, wumpus: false, gold: false };
    }
  }

  // Place pits (not at starting cell 0,0)
  var maxPits = Math.min(numPits, ROWS * COLS - 3);
  var placed = 0;
  for (var attempts = 0; placed < maxPits && attempts < 1000; attempts++) {
    var pr = randInt(ROWS), pc = randInt(COLS);
    if (pr === 0 && pc === 0) continue;
    if (grid[pr][pc].pit) continue;
    grid[pr][pc].pit = true;
    placed++;
  }

  // Place wumpus (not at 0,0 or on a pit)
  var wr, wc;
  for (var i = 0; i < 500; i++) {
    wr = randInt(ROWS); wc = randInt(COLS);
    if (wr === 0 && wc === 0) continue;
    if (grid[wr][wc].pit) continue;
    break;
  }
  grid[wr][wc].wumpus = true;

  var gr, gc;
  for (var j = 0; j < 500; j++) {
    gr = randInt(ROWS); gc = randInt(COLS);
    if (gr === 0 && gc === 0) continue;
    if (grid[gr][gc].pit || grid[gr][gc].wumpus) continue;
    break;
  }
  grid[gr][gc].gold = true;

  // Place agent at start
  agent = { r: 0, c: 0 };

  for (var r = 0; r < ROWS; r++) {
    for (var c = 0; c < COLS; c++) {
      var p = { breeze: false, stench: false, glitter: grid[r][c].gold };
      var nbrs = getNeighbors(r, c);
      for (var n = 0; n < nbrs.length; n++) {
        var nr = nbrs[n][0], nc = nbrs[n][1];
        if (grid[nr][nc].pit)    p.breeze = true;
        if (grid[nr][nc].wumpus) p.stench = true;
      }
      percepts[cellKey(r, c)] = p;
    }
  }

  // Start: mark (0,0) safe, visit it
  safeSet.add('0_0');
  visitCell(0, 0);

  // Update UI
  renderGrid();
  updateMetrics();
  setStatus('Agent at (0,0). Ready.');
  document.getElementById('btn-step').disabled = false;
  document.getElementById('btn-auto').disabled = false;
  document.getElementById('btn-stop').disabled = true;
}


// ─── Knowledge Base ─────────────────────────────────────────────

function addClause(literals) {
  var s = literals.map(function(l) { return (l.neg ? '~' : '') + l.name; }).sort().join('|');
  if (KB_index.has(s)) return;
  KB_index.add(s);
  KB.push(literals);
}

function visitCell(r, c) {
  visited.add(cellKey(r, c));
  safeSet.add(cellKey(r, c));

  var p = percepts[cellKey(r, c)];
  var nbrs = getNeighbors(r, c);

  // ── Pit rules ──
  if (p.breeze) {
    // Breeze here => at least one neighbor has a pit
    var pitClause = nbrs.map(function(n) { return { name: 'P_' + n[0] + '_' + n[1], neg: false }; });
    addClause(pitClause);
    // Any neighbor already proven safe cannot have a pit
    for (var i = 0; i < nbrs.length; i++) {
      if (safeSet.has(cellKey(nbrs[i][0], nbrs[i][1]))) {
        addClause([{ name: 'P_' + nbrs[i][0] + '_' + nbrs[i][1], neg: true }]);
      }
    }
  } else {
    // No breeze => none of the neighbors have a pit
    for (var i = 0; i < nbrs.length; i++) {
      addClause([{ name: 'P_' + nbrs[i][0] + '_' + nbrs[i][1], neg: true }]);
    }
  }

  if (p.stench) {
    var wumpusClause = nbrs.map(function(n) { return { name: 'W_' + n[0] + '_' + n[1], neg: false }; });
    addClause(wumpusClause);
    for (var i = 0; i < nbrs.length; i++) {
      if (safeSet.has(cellKey(nbrs[i][0], nbrs[i][1]))) {
        addClause([{ name: 'W_' + nbrs[i][0] + '_' + nbrs[i][1], neg: true }]);
      }
    }
  } else {
    for (var i = 0; i < nbrs.length; i++) {
      addClause([{ name: 'W_' + nbrs[i][0] + '_' + nbrs[i][1], neg: true }]);
    }
  }
}



function clauseToString(clause) {
  return clause.map(function(l) { return (l.neg ? '~' : '') + l.name; }).sort().join('|');
}


function resolveClauses(c1, c2) {
  var results = [];

  for (var i = 0; i < c1.length; i++) {
    for (var j = 0; j < c2.length; j++) {
      var l1 = c1[i], l2 = c2[j];

      if (l1.name === l2.name && l1.neg !== l2.neg) {

        // Build new clause = c1 + c2 minus the two complementary literals
        var combined = c1.filter(function(l) { return l !== l1; })
                  .concat(c2.filter(function(l) { return l !== l2; }));

        var newClause = [];
        var seen = new Set();
        var isTautology = false;

        for (var k = 0; k < combined.length; k++) {
          var lit = combined[k];
          var pos = (lit.neg ? '~' : '') + lit.name;
          var opp = (!lit.neg ? '~' : '') + lit.name;
          if (seen.has(opp)) { isTautology = true; break; }
          if (!seen.has(pos)) { seen.add(pos); newClause.push({ name: lit.name, neg: lit.neg }); }
        }

        if (!isTautology) {
          results.push(newClause);
        }
      }
    }
  }

  return results;
}


function resolutionRefute(propName) {
  // Copy KB and add the negated query as assumption
  var allClauses = KB.map(function(c) { return c.map(function(l) { return { name: l.name, neg: l.neg }; }); });
  allClauses.push([{ name: propName, neg: false }]); // assume hazard EXISTS

  var clauseSet = new Set(allClauses.map(clauseToString));
  var steps = 0;
  var MAX_STEPS = 400;

  while (steps < MAX_STEPS) {
    var foundNew = false;
    var n = allClauses.length;

    for (var i = 0; i < n && steps < MAX_STEPS; i++) {
      for (var j = i + 1; j < n && steps < MAX_STEPS; j++) {
        steps++;

        var resolvents = resolveClauses(allClauses[i], allClauses[j]);

        for (var k = 0; k < resolvents.length; k++) {
          var newClause = resolvents[k];

          // Empty clause = contradiction found!
          if (newClause.length === 0) {
            return { contradiction: true, steps: steps };
          }

          var s = clauseToString(newClause);
          if (!clauseSet.has(s)) {
            clauseSet.add(s);
            allClauses.push(newClause);
            foundNew = true;
          }
        }
      }
    }

    if (!foundNew) break; // no new clauses, resolution saturated
  }

  return { contradiction: false, steps: steps };
}

function isCellSafe(r, c) {
  var pitResult    = resolutionRefute('P_' + r + '_' + c);
  var wumpusResult = resolutionRefute('W_' + r + '_' + c);
  inferenceSteps += pitResult.steps + wumpusResult.steps;
  return pitResult.contradiction && wumpusResult.contradiction;
}


// ─── Agent Logic ────────────────────────────────────────────────

function agentStep() {
  if (gameOver) return;

  var r = agent.r, c = agent.c;

  // Check if standing on gold
  if (percepts[cellKey(r, c)].glitter) {
    setStatus('Gold found at (' + r + ',' + c + '). Agent wins!');
    endGame();
    return;
  }

  var neighbors = getNeighbors(r, c);
  var safeMoves    = [];
  var unknownMoves = [];

  // Classify each unvisited neighbor
  for (var i = 0; i < neighbors.length; i++) {
    var nr = neighbors[i][0], nc = neighbors[i][1];
    var nk = cellKey(nr, nc);

    if (dangerSet.has(nk)) continue;   // confirmed danger, skip
    if (visited.has(nk))   continue;   // already visited, skip for now

    if (safeSet.has(nk)) {
      safeMoves.push([nr, nc]);        // already known safe
    } else if (isCellSafe(nr, nc)) {
      safeSet.add(nk);
      safeMoves.push([nr, nc]);        // just proven safe
    } else {
      unknownMoves.push([nr, nc]);    
    }
  }

  updateMetrics();

  // Backtrack options (visited safe cells)
  var backtrackMoves = neighbors.filter(function(n) { return visited.has(cellKey(n[0], n[1])); });

  var moveTo = null;
  if (safeMoves.length > 0)        moveTo = safeMoves[0];
  else if (unknownMoves.length > 0) moveTo = unknownMoves[0];
  else if (backtrackMoves.length > 0) moveTo = backtrackMoves[0];

  if (!moveTo) {
    setStatus('No moves available. Agent is stuck.');
    endGame();
    return;
  }

  agent.r = moveTo[0];
  agent.c = moveTo[1];

  var cell = grid[agent.r][agent.c];
  if (cell.pit || cell.wumpus) {
    dangerSet.add(cellKey(agent.r, agent.c));
    setStatus('Agent died at (' + agent.r + ',' + agent.c + '). ' + (cell.pit ? 'Fell into Pit.' : 'Eaten by Wumpus.'));
    endGame();
    return;
  }

  visitCell(agent.r, agent.c);
  renderGrid();
  updateMetrics();
  setStatus('Agent at (' + agent.r + ',' + agent.c + ').');
}



function startAuto() {
  if (gameOver) return;
  document.getElementById('btn-auto').disabled = true;
  document.getElementById('btn-stop').disabled = false;
  document.getElementById('btn-step').disabled = true;
  autoTimer = setInterval(function() {
    if (gameOver) { stopAuto(); return; }
    agentStep();
  }, 600);
}

function stopAuto() {
  if (autoTimer) { clearInterval(autoTimer); autoTimer = null; }
  if (!gameOver) {
    document.getElementById('btn-auto').disabled = false;
    document.getElementById('btn-step').disabled = false;
  }
  document.getElementById('btn-stop').disabled = true;
}

function endGame() {
  gameOver = true;
  stopAuto();
  document.getElementById('btn-step').disabled = true;
  document.getElementById('btn-auto').disabled = true;
  renderGrid();
  updateMetrics();
}



function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

function updateMetrics() {
  document.getElementById('m-infer').textContent = inferenceSteps;

  var p = percepts[cellKey(agent.r, agent.c)] || {};
  var parts = [];
  if (p.breeze)  parts.push('Breeze');
  if (p.stench)  parts.push('Stench');
  if (p.glitter) parts.push('Glitter');
  document.getElementById('m-percepts').textContent = parts.length ? parts.join(', ') : 'None';
}

function renderGrid() {
  var el = document.getElementById('grid');
  el.style.gridTemplateColumns = 'repeat(' + COLS + ', 62px)';
  el.innerHTML = '';

  for (var r = ROWS - 1; r >= 0; r--) {
    for (var c = 0; c < COLS; c++) {
      var k = cellKey(r, c);
      var div = document.createElement('div');
      div.className = 'cell';

      var isAgent  = (agent.r === r && agent.c === c);
      var isDanger = dangerSet.has(k);
      var isSafe   = safeSet.has(k) || visited.has(k);

      if (isDanger)      div.classList.add('cell-danger');
      else if (isAgent)  div.classList.add('cell-agent');
      else if (isSafe)   div.classList.add('cell-safe');
      else               div.classList.add('cell-unknown');

      div.innerHTML = '<span class="coord">' + r + ',' + c + '</span>';

      if (gameOver || visited.has(k)) {
        var lbl = '';
        if (grid[r][c].pit)    lbl += 'P';
        if (grid[r][c].wumpus) lbl += (lbl ? ' ' : '') + 'W';
        if (grid[r][c].gold)   lbl += (lbl ? ' ' : '') + 'G';
        if (lbl) div.innerHTML += '<span class="lbl">' + lbl + '</span>';
      }

      el.appendChild(div);
    }
  }
}

</script>
</body>
</html>
